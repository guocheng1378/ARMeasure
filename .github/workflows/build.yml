name: Build APK

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'build.gradle.kts'
      - 'app/build.gradle.kts'
      - 'gradle/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run lint
        run: ./gradlew lintDebug

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: armeasure-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Generate version tag
        if: github.event_name == 'push'
        id: version
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0")
          LAST_NUM=${LAST_TAG#v}
          if [[ "$LAST_NUM" =~ ^[0-9]+$ ]]; then
            NEW_NUM=$((LAST_NUM + 1))
          else
            NEW_NUM=1
          fi
          NEW_TAG="v${NEW_NUM}"
          echo "tag=${NEW_TAG}" >> $GITHUB_OUTPUT
          echo "prev=${LAST_TAG}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        if: github.event_name == 'push'
        id: changelog
        run: |
          PREV=${{ steps.version.outputs.prev }}
          if [ "$PREV" = "v0" ]; then
            LOG=$(git log --oneline -10 --no-merges)
          else
            LOG=$(git log --oneline ${PREV}..HEAD --no-merges)
          fi
          {
            echo 'log<<EOF'
            echo "$LOG"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "ARMeasure ${{ steps.version.outputs.tag }}"
          body: |
            📱 **AR测距 App ${{ steps.version.outputs.tag }}**

            ### 最近改动
            ```
            ${{ steps.changelog.outputs.log }}
            ```

            ### 要求
            - Android 8.0+ (API 26+)
            - 支持 dToF 深度传感器的设备
          files: app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
